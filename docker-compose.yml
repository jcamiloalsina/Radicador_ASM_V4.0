version: '3.8'

services:
  # MongoDB Database with Authentication
  mongodb:
    image: mongo:6.0
    container_name: asomunicipios-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - ./backups:/backups
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      - MONGO_INITDB_DATABASE=catastro_asomunicipios
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_APP_USER=${MONGO_APP_USER:-app_user}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
    command: ["mongod", "--auth"]
    networks:
      - asomunicipios-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asomunicipios-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://${MONGO_APP_USER:-app_user}:${MONGO_APP_PASSWORD}@mongodb:27017/catastro_asomunicipios?authSource=admin
      - DB_NAME=catastro_asomunicipios
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - asomunicipios-network
    ports:
      - "8001:8001"

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL}
    container_name: asomunicipios-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - asomunicipios-network
    ports:
      - "80:80"

  # MongoDB Backup Service (Daily at 2 AM)
  mongo-backup:
    image: mongo:6.0
    container_name: asomunicipios-backup
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_APP_USER=${MONGO_APP_USER:-app_user}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
      - MONGO_INITDB_DATABASE=catastro_asomunicipios
    volumes:
      - ./backups:/backups
      - ./backup-script.sh:/backup-script.sh:ro
    entrypoint: /bin/bash
    command: >
      -c "chmod +x /backup-script.sh && 
          echo '0 2 * * * /backup-script.sh >> /var/log/backup.log 2>&1' > /etc/cron.d/backup-cron &&
          chmod 0644 /etc/cron.d/backup-cron &&
          crontab /etc/cron.d/backup-cron &&
          touch /var/log/backup.log &&
          echo 'Backup cron job installed. Running initial backup...' &&
          /backup-script.sh &&
          cron -f"
    networks:
      - asomunicipios-network

  # Nginx Reverse Proxy with SSL (optional, for HTTPS)
  # nginx-proxy:
  #   image: nginx:alpine
  #   container_name: asomunicipios-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx-proxy.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - asomunicipios-network

networks:
  asomunicipios-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
